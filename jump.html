<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D情侣跳一跳</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            transition: background 0.3s, color 0.2s;
        }

        :root {
            --bg: #fcfdff;
            --card: #ffffff;
            --text: #2d3436;
            --gray: #94a3b8;
            --me: #FFF9F2;
            --you: #F5F7FA;
            --accent: #4d9185;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1a1c20;
                --card: #25282f;
                --text: #e8e8e8;
                --gray: #8a91a0;
                --me: #383026;
                --you: #2d323b;
                --accent: #6bb9a5;
            }
        }

        body {
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 16px;
        }

        .header { text-align: center; margin-bottom: 16px; }
        .header h1 { font-weight: 300; font-size: 24px; }
        .header p { color: var(--gray); font-size: 14px; }

        .player-status {
            display: flex; gap: 12px; width: 100%; max-width: 400px; margin-bottom: 16px;
        }
        .player-card {
            flex: 1; background: var(--card); border-radius: 16px; padding: 12px; text-align: center;
        }
        .player-ready { color: var(--accent); font-weight: 500; }
        .player-wait { color: var(--gray); }

        .score-board {
            display: flex; gap: 12px; width: 100%; max-width: 400px; margin-bottom: 16px;
        }
        .score { flex: 1; background: var(--card); padding: 12px; border-radius: 16px; text-align: center; }
        .score-me { background: var(--me); }
        .score-you { background: var(--you); }

        #gameContainer {
            width: 100%; max-width: 400px; height: 480px;
            border-radius: 20px; overflow: hidden; background: var(--card);
        }

        .control-btn {
            margin-top: 20px; padding: 12px 30px;
            background: var(--accent); color: white; border: none;
            border-radius: 30px; font-size: 15px; cursor: pointer;
        }
        .control-btn:disabled { background: var(--gray); cursor: not-allowed; }

        .tip { margin-top: 10px; font-size: 13px; color: var(--gray); }
    </style>
</head>

<body>
    <div class="header">
        <h1>3D情侣联机跳一跳 💖</h1>
        <p>双人实时联机 · 轮流跳跃</p>
    </div>

    <div class="player-status">
        <div class="player-card">我<br><span class="player-ready">✅ 已进入</span></div>
        <div class="player-card" id="statusYa">小雅<br><span class="player-wait">⏳ 等待中</span></div>
    </div>

    <div class="score-board">
        <div class="score score-me">我<br><span id="score1">0</span></div>
        <div class="score score-you">小雅<br><span id="score2">0</span></div>
    </div>

    <div id="gameContainer"></div>
    <button class="control-btn" id="jumpBtn" disabled>长按跳跃</button>
    <div class="tip">两人进入后自动开始游戏</div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // === 你的配置 ===
        const SUPABASE_URL = "https://mlbmqulqxdjjkvvxeegu.supabase.co";
        const SUPABASE_KEY = "sb_publishable_CMZpG9TVXwiUVl_hBN1YfQ_QTjatNP1";
        const { createClient } = supabase;
        const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

        const ROOM_ID = "couple_jump";
        let me = null; // "me" / "you"
        let game = {};

        // === 3D 场景 ===
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, 400/480, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(400, 480);
        document.getElementById("gameContainer").appendChild(renderer.domElement);

        scene.background = new THREE.Color(0xf9f9fc);
        camera.position.set(0, 5, 8);
        camera.lookAt(0,0,0);
        scene.add(new THREE.HemisphereLight(0xffffff, 0x666666, 1));

        const ball = new THREE.Mesh(
            new THREE.SphereGeometry(0.3, 16,16),
            new THREE.MeshLambertMaterial({ color: 0xff9ebb })
        );
        ball.position.set(-2, 0.3, 0);
        scene.add(ball);

        const block = new THREE.Mesh(
            new THREE.BoxGeometry(1, 0.4, 1),
            new THREE.MeshLambertMaterial({ color: 0x87ceeb })
        );
        block.position.set(3, 0.2, 0);
        scene.add(block);

        (function loop(){ requestAnimationFrame(loop); renderer.render(scene,camera); })();

        // === 跳跃 ===
        const btn = document.getElementById("jumpBtn");
        let power = 0, timer = null, jumping = false;

        btn.onmousedown = btn.ontouchstart = (e)=>{ e.preventDefault();
            if(jumping || game.current_turn!==me) return;
            power=0; btn.textContent="蓄力中...";
            timer=setInterval(()=>{ power++; if(power>40)power=40; },30);
        }

        btn.onmouseup = btn.ontouchend = async (e)=>{ e.preventDefault();
            clearInterval(timer); btn.textContent="长按跳跃";
            if(jumping || game.current_turn!==me) return;
            jumping=true; await save({is_jumping:true});

            const tar = -2 + power*0.12;
            await anim(tar);
            const ok = Math.abs(tar - game.blockX) < 0.6;

            let ns = {...game.scores};
            let nt = game.current_turn;
            if(ok) ns[me]++;
            else nt = nt==="me"?"you":"me";

            ball.position.set(-2,0.3,0);
            await save({
                is_jumping:false, scores:ns, current_turn:nt,
                blockX: ok ? 2+Math.random()*4 : game.blockX
            });
            jumping=false;
        }

        function anim(x){
            return new Promise(r=>{
                let t=0; const i=setInterval(()=>{
                    t++; ball.position.y=0.3+Math.sin(t*0.4)*1.3;
                    ball.position.x = -2 + (x+2)*(t/30);
                    if(t>=30){ clearInterval(i); ball.y=0.3; r(); }
                },16);
            })
        }

        // === 房间 ===
        async function init(){
            const { data } = await sb.from("game_rooms").select("*").eq("room_id",ROOM_ID).single();
            
            if(!data){
                me = "me";
                await sb.from("game_rooms").insert({
                    room_id:ROOM_ID, player_ready:{me:true,you:false},
                    current_turn:"me", scores:{me:0,you:0}, blockX:3
                });
            }else{
                me = data.player_ready.you ? "me" : "you";
                await save({player_ready:{me:true,you:true}});
            }
            listen();
        }

        function listen(){
            sb.channel("g").on("postgres_changes",{event:"UPDATE",table:"game_rooms"},p=>{
                game = p.new;
                document.getElementById("score1").textContent=game.scores.me;
                document.getElementById("score2").textContent=game.scores.you;
                if(game.player_ready.you) document.getElementById("statusYa").innerHTML=`小雅<br><span class="player-ready">✅ 已进入</span>`;
                btn.disabled = !(game.player_ready.me&&game.player_ready.you&&game.current_turn===me);
            }).subscribe();
        }

        async function save(d){
            await sb.from("game_rooms").update(d).eq("room_id",ROOM_ID);
        }

        init();
    </script>
</body>
</html>
